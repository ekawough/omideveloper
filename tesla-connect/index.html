<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Omi Connect - Tesla</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080808;color:#F0F0ED;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:100%;max-width:400px}
.card{background:#101010;border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:40px 28px;display:flex;flex-direction:column;align-items:center}
.logo{width:60px;height:60px;background:#161616;border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:24px}
h1{font-size:30px;font-weight:800;text-align:center;line-height:1.1;margin-bottom:10px}
.r{color:#E82127}.g{color:#22C55E}
.sub{font-size:14px;color:#666;text-align:center;line-height:1.6;margin-bottom:28px}
.wake{width:100%;background:#161616;border-radius:12px;padding:14px 16px;margin-bottom:24px}
.wl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#555;margin-bottom:10px}
.we{font-size:13px;display:flex;gap:10px;margin-top:7px}
.kw{color:#E82127;font-weight:600}
.div{width:100%;height:1px;background:rgba(255,255,255,.06);margin-bottom:24px}
.btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;background:#E82127;color:#fff}
.btn:hover{opacity:.9}
.trust{margin-top:14px;font-size:11px;color:#444;text-align:center}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px}
.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#22C55E}
.err{background:rgba(232,33,39,.1);border:1px solid rgba(232,33,39,.3);color:#E82127}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.car{width:100%;background:#161616;border:1px solid rgba(34,197,94,.2);border-radius:12px;padding:16px;margin-bottom:24px;display:flex;align-items:center;gap:12px}
.ci{width:40px;height:40px;background:rgba(34,197,94,.1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.cn{font-size:15px;font-weight:700}
.cs{font-size:11px;color:#555;margin-top:2px}
</style>
</head>
<body>
<div class="wrap"><div class="card" id="app"></div></div>
<script>
var p=new URLSearchParams(location.search);
var status=p.get('status'),uid=p.get('uid'),vehicle=p.get('vehicle'),msg=p.get('msg');
var el=document.getElementById('app');

function logo(){
  return '<div class="logo"><svg width="32" height="32" viewBox="0 0 100 100" fill="none"><path d="M50 22L50 78M28 22L72 22M28 15Q50 20 72 15" stroke="#E82127" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="20" cy="50" r="4" fill="white" opacity="0.35"/><circle cx="80" cy="50" r="4" fill="white" opacity="0.35"/></svg></div>';
}

function setup(){
  var href = uid ? '/auth/tesla?uid='+uid : '#';
  el.innerHTML = logo()+
    '<h1>Control Your<br><span class="r">Tesla</span> by Voice</h1>'+
    '<p class="sub">Wear Omi. Say Tesla then your command. Your car responds instantly.</p>'+
    '<div class="wake">'+
      '<div class="wl">Say it like this</div>'+
      '<div class="we"><span class="kw">Tesla,</span><span>unlock my car</span></div>'+
      '<div class="we"><span class="kw">Tesla,</span><span>open the trunk</span></div>'+
      '<div class="we"><span class="kw">Tesla,</span><span>start climate</span></div>'+
      '<div class="we"><span class="kw">Tesla,</span><span>start cha      '<div class="we"><span class="kw">Tesla,<ass="div"></div>'+
    '<a class="btn" href="'+href+'">Connect Your Tesla</a>'+
    '<div class="trust">Tesla OAuth - credentials never stored</div>';
}

function success(){
  var name = vehicle ? decodeURIComponent(vehicle) : 'Your Tesla';
  el.innerHTML = logo()+
    '<div class="badge ok"><span class="dot"></span>Connected</div>'+
    '<h1>Ready,<br><span class="g">lets go.</span></h1>'+
    '<p class="sub">Say Tesla followed by any command. Your car responds instantly.</p>'+
    '<div class="car"><div class="ci">Car</div><div><div class="cn">'+name+'</div><div class="cs">Linked via Tesla Fleet API</div></div></div>'+
    '<div class="wake">'+
      '<div class="wl">Try right now</div>'+
      '<div class="we"><span class="kw">Tesla,</span><span>unlock my car</span></div>'+
      '<div class="we"><span class="kw">Tesla,</span><span>open the trunk</span></div>'+
      '<div class="we"><span class="kw">Tesla,</span><span>start climate</span></div>'+
    '</div>'+
    '<div class="div"></div>'+
    '<div class="trust">Omi Connect is listening for Tesla commands</div>';
}

function error(){
  var m = msg ? decodeURIComponent(msg) : 'Authentication failed.';
  var href = uid ? '/auth/tesla?uid='+uid : '/';
  el.innerHTML = logo()+
    '<div class="badge err"><span class="dot"></span>Failed</div>'+
    '<h1>Something<br><span class="r">went wrong</span></h1>'+
    '<p class="sub">'+m+'</p>'+
    '<div class="div"></div>'+
    '<a class="btn" href="'+href+'">Try Again</a>';
}

if(status==='success') success();
else if(status==='error') error();
else setup();
</script>
</body>
</html>
