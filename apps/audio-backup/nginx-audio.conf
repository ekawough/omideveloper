# nginx block for audio.omideveloper.com
# Add this as a new server block (separate file or append to existing nginx config)
#
# After copying:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d audio.omideveloper.com

server {
    listen 80;
    listen [::]:80;
    server_name audio.omideveloper.com;

    access_log /var/log/nginx/audio-vault.access.log;
    error_log  /var/log/nginx/audio-vault.error.log;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Keep WebSocket connections alive
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
