<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SalesSignal — Admin</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
  <style>
    :root {
      --bg: #0b0f17;
      --panel: #121a26;
      --panel-2: #1a2434;
      --fg: #e6edf7;
      --muted: #8b99af;
      --accent: #4fd1c5;
      --warn: #f4a261;
      --bad: #e76f51;
      --good: #4ade80;
      --border: #23314a;
    }
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--fg);
    }
    .app { display: grid; grid-template-columns: 220px 1fr; height: 100vh; }
    .sidebar {
      background: var(--panel); border-right: 1px solid var(--border); padding: 20px 0;
    }
    .sidebar h1 {
      font-size: 16px; margin: 0 20px 24px; letter-spacing: 0.04em;
      color: var(--accent);
    }
    .sidebar button {
      display: block; width: 100%; text-align: left; padding: 10px 20px;
      background: none; border: 0; color: var(--muted); font-size: 14px;
      cursor: pointer; border-left: 3px solid transparent;
    }
    .sidebar button.active { color: var(--fg); border-left-color: var(--accent); background: var(--panel-2); }
    .main { overflow-y: auto; padding: 28px; }
    h2 { font-size: 22px; font-weight: 600; margin: 0 0 20px; }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 18px; margin-bottom: 18px;
    }
    .card h3 { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 12px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .stat { font-size: 28px; font-weight: 600; }
    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px;
      font-weight: 600;
    }
    .badge.active      { background: #234160; color: #bee0ff; }
    .badge.processing  { background: #4a3d1a; color: #ffe3a0; }
    .badge.completed   { background: #1a4a33; color: #bef5d0; }
    .badge.error       { background: #5a1f1f; color: #ffbdbd; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
    tr.row { cursor: pointer; }
    tr.row:hover { background: var(--panel-2); }
    .score {
      display: inline-block; min-width: 32px; text-align: center; padding: 4px 8px;
      border-radius: 6px; font-weight: 700;
    }
    .score.hot  { background: #3a1b1b; color: #ff8a8a; }
    .score.warm { background: #3a2d1b; color: #ffce5c; }
    .score.cold { background: #1b2a3a; color: #9ec3ff; }
    input, select, textarea {
      width: 100%; background: var(--panel-2); color: var(--fg);
      border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px;
      font-size: 14px; font-family: inherit;
    }
    label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; }
    button.primary {
      background: var(--accent); color: #0b0f17; border: 0; border-radius: 6px;
      padding: 10px 18px; font-weight: 600; cursor: pointer; font-size: 14px;
    }
    button.secondary {
      background: transparent; color: var(--fg); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 18px; cursor: pointer; font-size: 14px;
    }
    pre { background: #050709; border: 1px solid var(--border); border-radius: 6px;
      padding: 12px; font-size: 12px; overflow: auto; max-height: 300px; }
    .flex { display: flex; gap: 10px; align-items: center; }
    .muted { color: var(--muted); font-size: 13px; }
    .timeline-flag {
      font-size: 11px; color: var(--warn); margin-left: 6px;
    }
    .setup-hint {
      background: #1a2534; border: 1px dashed var(--border); border-radius: 8px;
      padding: 14px; margin-bottom: 14px; font-size: 13px; color: var(--muted);
    }
    .setup-hint code { color: var(--accent); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo } = React;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceArea } = Recharts;

    // ------------------------------------------------------------------ config
    // Values populated by admin user at runtime, persisted in localStorage.
    function useConfig() {
      const [cfg, setCfg] = useState(() => {
        try { return JSON.parse(localStorage.getItem("salessignal.cfg") || "{}"); }
        catch { return {}; }
      });
      const save = (next) => {
        setCfg(next);
        localStorage.setItem("salessignal.cfg", JSON.stringify(next));
      };
      return [cfg, save];
    }

    // ------------------------------------------------------------------ supabase
    function useSupabase(cfg) {
      return useMemo(() => {
        if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) return null;
        return supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
      }, [cfg.supabaseUrl, cfg.supabaseAnonKey]);
    }

    function useSessions(client) {
      const [rows, setRows] = useState([]);
      useEffect(() => {
        if (!client) return;
        let alive = true;
        (async () => {
          const { data } = await client.from("sessions")
            .select("*").order("started_at", { ascending: false }).limit(50);
          if (alive && data) setRows(data);
        })();
        const ch = client.channel("sessions-admin")
          .on("postgres_changes", { event: "*", schema: "public", table: "sessions" },
              (payload) => {
                setRows((cur) => {
                  const updated = payload.new || payload.old;
                  if (!updated) return cur;
                  const without = cur.filter(r => r.id !== updated.id);
                  if (payload.eventType === "DELETE") return without;
                  return [updated, ...without].slice(0, 50);
                });
              }).subscribe();
        return () => { alive = false; client.removeChannel(ch); };
      }, [client]);
      return rows;
    }

    // ------------------------------------------------------------------ pages
    function Dashboard({ sessions }) {
      const active     = sessions.filter(s => s.status === "active").length;
      const processing = sessions.filter(s => s.status === "processing").length;
      const completed  = sessions.filter(s => s.status === "completed").length;
      const hot        = sessions.filter(s => s.lead_score && s.lead_score >= 8).length;
      return (
        <div>
          <h2>Pipeline monitor</h2>
          <div className="grid-3">
            <div className="card"><h3>Active</h3><div className="stat">{active}</div></div>
            <div className="card"><h3>Processing</h3><div className="stat">{processing}</div></div>
            <div className="card"><h3>Hot leads (≥8)</h3><div className="stat">{hot}</div></div>
          </div>
          <div className="card">
            <h3>Recent sessions</h3>
            <SessionsTable sessions={sessions} />
          </div>
        </div>
      );
    }

    function SessionsTable({ sessions }) {
      const [selected, setSelected] = useState(null);
      if (!sessions.length) return <div className="muted">No sessions yet. When a rep finishes a conversation, it will appear here.</div>;
      return (
        <>
          <table>
            <thead>
              <tr>
                <th>Started</th><th>Status</th><th>Score</th><th>GHL</th><th>HubSpot</th><th>Rep</th>
              </tr>
            </thead>
            <tbody>
              {sessions.map(s => (
                <tr key={s.id} className="row" onClick={() => setSelected(s)}>
                  <td>{new Date(s.started_at).toLocaleString()}</td>
                  <td><span className={"badge " + s.status}>{s.status}</span></td>
                  <td>{s.lead_score ? <ScoreChip score={s.lead_score} /> : <span className="muted">—</span>}</td>
                  <td>{s.ghl_contact_id ? "✓" : <span className="muted">—</span>}</td>
                  <td>{s.hubspot_contact_id ? "✓" : <span className="muted">—</span>}</td>
                  <td>{s.rep_id ? String(s.rep_id).slice(0, 8) : <span className="muted">—</span>}</td>
                </tr>
              ))}
            </tbody>
          </table>
          {selected && <SessionDetail s={selected} onClose={() => setSelected(null)} />}
        </>
      );
    }

    function ScoreChip({ score }) {
      const cls = score >= 8 ? "hot" : score >= 5 ? "warm" : "cold";
      return <span className={"score " + cls}>{score}</span>;
    }

    function SessionDetail({ s, onClose }) {
      const timeline = Array.isArray(s.fusion_timeline) ? s.fusion_timeline : [];
      const chart = timeline.map((seg, i) => ({
        i,
        t: seg.start,
        sentiment_text: Number(seg.sentiment_text || 0),
        speaker: seg.speaker,
        flag: seg.flag,
        emotion: seg.emotion_acoustic,
        mood: seg.fused_mood,
      }));
      return (
        <div className="card" style={{ marginTop: 18 }}>
          <div className="flex" style={{ justifyContent: "space-between" }}>
            <h3>Session {String(s.id).slice(0, 8)}</h3>
            <button className="secondary" onClick={onClose}>Close</button>
          </div>
          <div className="muted" style={{ marginBottom: 10 }}>
            {s.ghl_contact_id && <>GHL contact <code>{s.ghl_contact_id}</code>&nbsp;&nbsp;</>}
            {s.hubspot_contact_id && <>HubSpot contact <code>{s.hubspot_contact_id}</code></>}
          </div>
          {chart.length > 0 && (
            <>
              <h3 style={{ marginTop: 10 }}>Sentiment timeline</h3>
              <div style={{ height: 220 }}>
                <ResponsiveContainer>
                  <LineChart data={chart} margin={{ top: 10, right: 20, left: 0, bottom: 0 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#23314a" />
                    <XAxis dataKey="t" stroke="#8b99af" tickFormatter={(v) => `${Math.round(v)}s`} />
                    <YAxis domain={[-1, 1]} stroke="#8b99af" />
                    <Tooltip contentStyle={{ background: "#121a26", border: "1px solid #23314a" }}
                             labelFormatter={(v) => `t=${Math.round(v)}s`} />
                    <Line type="monotone" dataKey="sentiment_text" stroke="#4fd1c5"
                          strokeWidth={2} dot={{ r: 3 }} isAnimationActive={false} />
                  </LineChart>
                </ResponsiveContainer>
              </div>
              <div className="muted" style={{ marginTop: 6 }}>
                Flags detected: {timeline.filter(t => t.flag).map((t, i) =>
                  <span key={i} className="timeline-flag">{t.flag} @ {Math.round(t.start)}s</span>
                )}
                {timeline.every(t => !t.flag) && "none"}
              </div>
            </>
          )}
          <h3 style={{ marginTop: 18 }}>Transcript</h3>
          <pre>{s.transcript || "(no transcript)"}</pre>
          <h3>Crew output</h3>
          <pre>{JSON.stringify(s.crew_output, null, 2)}</pre>
        </div>
      );
    }

    function Settings({ cfg, save }) {
      const [local, setLocal] = useState(cfg);
      useEffect(() => setLocal(cfg), [cfg]);
      return (
        <div>
          <h2>Settings</h2>
          <div className="card">
            <h3>Supabase connection</h3>
            <label>Project URL</label>
            <input value={local.supabaseUrl || ""} onChange={e => setLocal({ ...local, supabaseUrl: e.target.value })}
                   placeholder="https://YOUR_PROJECT.supabase.co" />
            <label>Anon key (public, safe for browser)</label>
            <input value={local.supabaseAnonKey || ""} onChange={e => setLocal({ ...local, supabaseAnonKey: e.target.value })}
                   placeholder="eyJhbGciOi…" />
            <div style={{ marginTop: 16 }} className="flex">
              <button className="primary" onClick={() => save(local)}>Save</button>
              <button className="secondary" onClick={() => { localStorage.removeItem("salessignal.cfg"); save({}); }}>Disconnect</button>
            </div>
          </div>
          <div className="card">
            <h3>CRM connection status</h3>
            <div className="muted">
              GHL and HubSpot tokens live in the agent service environment, not the browser.
              Manage them via your Railway project variables on <code>agent-pipeline</code>.
              <ul>
                <li><code>GHL_API_TOKEN</code>, <code>GHL_LOCATION_ID</code></li>
                <li><code>HUBSPOT_ACCESS_TOKEN</code></li>
              </ul>
            </div>
          </div>
          <div className="card">
            <h3>Scoring rules</h3>
            <label>Hot lead threshold</label>
            <input type="number" min="1" max="10" value={local.hotThreshold ?? 8}
                   onChange={e => setLocal({ ...local, hotThreshold: Number(e.target.value) })} />
            <label>Data retention (days)</label>
            <input type="number" min="1" value={local.retentionDays ?? 30}
                   onChange={e => setLocal({ ...local, retentionDays: Number(e.target.value) })} />
            <div style={{ marginTop: 16 }}>
              <button className="primary" onClick={() => save(local)}>Save</button>
            </div>
          </div>
        </div>
      );
    }

    function ConsentAudit({ client }) {
      const [rows, setRows] = useState([]);
      useEffect(() => {
        if (!client) return;
        let alive = true;
        (async () => {
          const { data } = await client.from("consent_log")
            .select("*").order("consented_at", { ascending: false }).limit(200);
          if (alive && data) setRows(data);
        })();
      }, [client]);
      return (
        <div>
          <h2>Consent audit trail</h2>
          <div className="card">
            <div className="muted" style={{ marginBottom: 12 }}>
              Every conversation captured with SalesSignal is logged here with timestamp, GPS, and method.
              Exportable for legal review.
            </div>
            <table>
              <thead>
                <tr><th>When</th><th>State</th><th>Method</th><th>Given</th><th>Homeowner</th><th>GPS</th></tr>
              </thead>
              <tbody>
                {rows.map(r => (
                  <tr key={r.id}>
                    <td>{new Date(r.consented_at).toLocaleString()}</td>
                    <td>{r.state_code || "—"}</td>
                    <td>{r.consent_method}</td>
                    <td>{r.consent_given ? "✓" : "✗"}</td>
                    <td>{r.homeowner_name || "—"}</td>
                    <td className="muted">{r.gps_lat ? `${r.gps_lat.toFixed(3)}, ${r.gps_lon.toFixed(3)}` : "—"}</td>
                  </tr>
                ))}
                {!rows.length && <tr><td colSpan={6} className="muted">No consent entries yet.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function ConsentConfig({ cfg, save }) {
      const [local, setLocal] = useState(cfg);
      useEffect(() => setLocal(cfg), [cfg]);
      return (
        <div>
          <h2>Consent configuration</h2>
          <div className="card">
            <h3>Default verbal consent script</h3>
            <textarea rows={4} value={local.consentScript || ""}
                      onChange={e => setLocal({ ...local, consentScript: e.target.value })}
                      placeholder="Hi, I'm with [Company]. Before we talk I want to let you know this conversation is being recorded so our AI can write up our notes — is that alright?" />
            <label>Two-party states require explicit verbal + button confirmation</label>
            <select value={local.strict ? "strict" : "normal"}
                    onChange={e => setLocal({ ...local, strict: e.target.value === "strict" })}>
              <option value="strict">Strict — block session without explicit confirmation</option>
              <option value="normal">Normal — verbal disclosure sufficient in one-party states</option>
            </select>
            <label>
              <input type="checkbox" style={{ width: "auto", marginRight: 8 }}
                     checked={!!local.bipa}
                     onChange={e => setLocal({ ...local, bipa: e.target.checked })} />
              Enable Illinois BIPA electronic-consent form
            </label>
            <div style={{ marginTop: 16 }}>
              <button className="primary" onClick={() => save(local)}>Save</button>
              <a href="consent.html" target="_blank" style={{ marginLeft: 12 }}>
                <button className="secondary">Preview iPad form →</button>
              </a>
            </div>
          </div>
        </div>
      );
    }

    // ------------------------------------------------------------------ app
    function App() {
      const [cfg, save] = useConfig();
      const client = useSupabase(cfg);
      const sessions = useSessions(client);
      const [page, setPage] = useState("dashboard");
      const pages = {
        dashboard: <Dashboard sessions={sessions} />,
        consent:   <ConsentAudit client={client} />,
        consentCfg:<ConsentConfig cfg={cfg} save={save} />,
        settings:  <Settings cfg={cfg} save={save} />,
      };
      return (
        <div className="app">
          <nav className="sidebar">
            <h1>SalesSignal</h1>
            <button className={page === "dashboard" ? "active" : ""} onClick={() => setPage("dashboard")}>Pipeline</button>
            <button className={page === "consent" ? "active" : ""} onClick={() => setPage("consent")}>Consent audit</button>
            <button className={page === "consentCfg" ? "active" : ""} onClick={() => setPage("consentCfg")}>Consent config</button>
            <button className={page === "settings" ? "active" : ""} onClick={() => setPage("settings")}>Settings</button>
          </nav>
          <main className="main">
            {!client && (
              <div className="setup-hint">
                <strong>Welcome.</strong> Open <em>Settings</em> and paste your Supabase project URL + anon key to connect.
              </div>
            )}
            {pages[page]}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
