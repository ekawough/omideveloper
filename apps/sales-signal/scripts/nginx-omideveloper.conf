# nginx virtual host — omideveloper.com
# Hostinger VPS: 93.188.165.65
# WordPress root: /var/www/omideveloper
# PHP-FPM: /run/php/php8.2-fpm.sock
#
# ─── ENABLE & RUN CERTBOT ────────────────────────────────────────────────────
#
# 1. Copy this file into place:
#      sudo cp nginx-omideveloper.conf /etc/nginx/sites-available/omideveloper.com
#
# 2. Enable the site:
#      sudo ln -s /etc/nginx/sites-available/omideveloper.com \
#                 /etc/nginx/sites-enabled/omideveloper.com
#
# 3. Test and reload nginx:
#      sudo nginx -t && sudo systemctl reload nginx
#
# 4. After DNS A-record for omideveloper.com → 93.188.165.65 has propagated,
#    run certbot to obtain and install the SSL certificate:
#      sudo certbot --nginx -d omideveloper.com -d www.omideveloper.com
#
# 5. Certbot will modify this file automatically to add port 443 blocks,
#    HTTP→HTTPS redirect, and ssl_certificate directives.
#    After certbot runs, reload nginx once more:
#      sudo systemctl reload nginx
#
# ─── EXISTING SERVICES — DO NOT TOUCH ────────────────────────────────────────
# Tesla OAuth proxy  → port 3458 (separate server block, not in this file)
# VCP Proxy          → port 4443 (separate server block, not in this file)
# connect.omideveloper.com → handled in its own server block, not here
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;

    server_name omideveloper.com www.omideveloper.com;

    root /var/www/omideveloper;
    index index.php index.html index.htm;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/omideveloper.access.log;
    error_log  /var/log/nginx/omideveloper.error.log;

    # ── WordPress permalink support ───────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ── PHP-FPM 8.2 ──────────────────────────────────────────────────────────
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Sane timeouts for WP admin / plugin installs
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 300;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        log_not_found off;
        access_log off;
    }

    # ── Deny access to sensitive files ────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* /(?:wp-config\.php|xmlrpc\.php|readme\.html|license\.txt)$ {
        deny all;
    }

    # ── Block wp-login.php brute-force (rate limit) ───────────────────────────
    # Requires: limit_req_zone $binary_remote_addr zone=wplogin:10m rate=1r/s;
    # in nginx.conf http block. Uncomment the lines below once that's added.
    # location = /wp-login.php {
    #     limit_req zone=wplogin burst=3 nodelay;
    #     include snippets/fastcgi-php.conf;
    #     fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    #     fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    #     include fastcgi_params;
    # }

    # ── WordPress uploads: block PHP execution inside uploads dir ─────────────
    location ~* /wp-content/uploads/.*\.php$ {
        deny all;
    }

    # ── Client body size (increase for media uploads) ─────────────────────────
    client_max_body_size 64M;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;
}
